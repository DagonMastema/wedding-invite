<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="rotate-device-screen">
    <div class="rotate-content">
        <div class="phone-icon">🔄</div>
        <h2>Please tilt your phone</h2>
        <p>Rotate to landscape to view the invitation</p>
    </div>
</div>

<div class="main-content">
    <div class="invitation-wrapper">
        <video id="wedding-video" playsinline poster="poster.png">
            <source src="video.mp4" type="video/mp4">
        </video>
        <div id="video-controls" class="overlay">
            <div class="text-content">
                <p>Invitation for</p>
                <h1 id="guest-name">Valued Guest</h1>
                <button id="play-btn">Click to Open</button>
            </div>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
