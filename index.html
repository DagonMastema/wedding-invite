<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="rotate-device-screen">
    <div class="rotate-content">
        <div class="guide-container">
            <div class="phone-silhouette">
                <div class="phone-screen"></div>
            </div>
        </div>
        
        <h2 id="guest-greeting">Hello!</h2>
        <p>Please rotate your phone to landscape</p>
        
        <div class="orientation-hint">
            <p class="hint-title">Screen not rotating?</p>
            <p class="hint-text">Swipe down from the top of your screen and turn off <b>"Portrait Orientation Lock"</b> or <b>"Auto-rotate"</b>.</p>
        </div>
    </div>
</div>

<div class="main-content">
    <div class="invitation-wrapper">
        <video id="wedding-video" playsinline poster="poster.png">
            <source src="video.mp4" type="video/mp4">
        </video>
        <div id="video-controls" class="overlay">
            <div class="text-content">
                <p>Invitation for</p>
                <h1 id="guest-name">Valued Guest</h1>
                <button id="play-btn">Click to Open</button>
            </div>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
